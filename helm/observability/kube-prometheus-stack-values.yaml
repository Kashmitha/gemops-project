# NEVER put real Slack webhook here. Inject via: kubectl create secret
# kube-prometheus-stack — Prometheus + Grafana + Alertmanager bundle
# https://github.com/prometheus-community/helm-charts

grafana:
  enabled: true
  adminPassword: "GemOps123"
  grafana.ini:
    server:
      root_url: "http://localhost:3000"
    unified_alerting:
      enabled: true
    alerting:
      enabled: false

  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki-gateway.monitoring.svc.cluster.local
      access: proxy
      isDefault: false

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: "GemOps"
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

prometheus:
  prometheusSpec:
    scrapeInterval: 30s
    evaluationInterval: 30s
    retention: 7d
    retentionSize: "5GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          resources:
            requests:
              storage: 10Gi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          resources:
            requests:
              storage: 2Gi
  config:
    global:
      resolve_timeout: 5m
      slack_api_url: "${SLACK_WEBHOOK_URL}"
    route:
      group_by: ["alertname", "namespace"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-critical
      routes:
        - matchers:
            - severity = warning
          receiver: slack-warning
        - matchers:
            - severity = critical
          receiver: slack-critical
    receivers:
      - name: slack-warning
        slack_configs:
          - channel: "#gemops-alerts"
            send_resolved: true
            title: "WARNING: {{ .CommonLabels.alertname }}"
            text: "Alert: {{ .CommonLabels.alertname }} Namespace: {{ .CommonLabels.namespace }}"
      - name: slack-critical
        slack_configs:
          - channel: "#gemops-alerts"
            send_resolved: true
            title: "CRITICAL: {{ .CommonLabels.alertname }}"
            text: "Alert: {{ .CommonLabels.alertname }} Severity: {{ .CommonLabels.severity }}"
    templates: []

additionalPrometheusRulesMap:
  gemops-rules:
    groups:
      - name: gemops.app
        rules:
          - alert: GemOpsHighErrorRate
            expr: |
              rate(gemops_errors_total[5m]) > 0.1
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "High error rate on GemOps API"
              description: "Error rate is {{ $value | humanize }} errors/sec."

          - alert: GemOpsHighLatency
            expr: |
              histogram_quantile(0.95,
                rate(gemops_request_duration_seconds_bucket[5m])
              ) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "P95 latency above 500ms"
              description: "95th percentile latency is {{ $value | humanizeDuration }}."

          - alert: GemOpsPodNotReady
            expr: |
              kube_pod_status_ready{namespace="app", condition="true"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "GemOps pod not ready"
              description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready."

          - alert: GemOpsHighCPU
            expr: |
              rate(container_cpu_usage_seconds_total{
                namespace="app", container="flask-api"
              }[5m]) > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU usage on Flask API"
              description: "CPU usage is {{ $value | humanizePercentage }}."

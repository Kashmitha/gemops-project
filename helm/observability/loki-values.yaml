loki:
  auth_enabled: false
  
  commonConfig:
    replication_factor: 1
  
  storage:
    type: filesystem
  
  # Retention
  limits_config:
    retention_period: 168h   # 7 days
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
  
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

# Single binary deployment (not microservices — simpler for demo)
deploymentMode: SingleBinary

singleBinary:
  replicas: 1
  persistence:
    storageClass: gp2
    size: 10Gi

# Disable components not needed in single binary mode
backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Use Alloy instead of Promtail (Promtail is feature-complete, Alloy is the future)
test:
  enabled: false
lokiCanary:
  enabled: false

  chunksCache:
  enabled: false

resultsCache:
  enabled: false
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-flask
  namespace: {{ .Release.Namespace }}
  labels:
    app: flask-api
spec:
  type: {{ .Values.service.type }}
  selector:
    app: flask-api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 5000
      protocol: TCP
